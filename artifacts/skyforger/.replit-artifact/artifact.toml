kind = "web"
previewPath = "/"
title = "SkyForger Technologies"
version = "1.0.0"
id = "artifacts/skyforger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20388

[services.development]
run = "pnpm --filter @workspace/skyforger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skyforger", "run", "build" ]
publicDir = "artifacts/skyforger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20388"
BASE_PATH = "/"
